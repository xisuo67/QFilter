name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Read changelog for this version
        id: changelog
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME:-}" == app-v* ]]; then
            VERSION="${GITHUB_REF_NAME#app-v}"
          else
            if [ ! -f src-tauri/tauri.conf.json ]; then
              echo "src-tauri/tauri.conf.json not found" >&2
              exit 1
            fi
            VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          fi

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Unable to determine version (ref: ${GITHUB_REF_NAME:-<empty>})" >&2
            exit 1
          fi
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found" >&2
            exit 1
          fi

          # Extract section from "## VERSION" until next "## " heading (or EOF)
          body="$(
            awk -v v="$VERSION" '
              $0 ~ ("^##[[:space:]]+" v "([[:space:]]|$|\\()") { in_section=1; print; next }
              in_section && $0 ~ /^##[[:space:]]+/ { exit }
              in_section { print }
            ' CHANGELOG.md
          )"

          if [ -z "$body" ]; then
            echo "No changelog section found for version: $VERSION" >&2
            exit 1
          fi

          DELIM="CHANGELOG_EOF_$(date +%s%N)"
          echo "body<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: app-v__VERSION__
          releaseName: App v__VERSION__
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

